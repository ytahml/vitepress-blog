name: Deploy to External Repository

on:
  push:
    branches: [master]   # 你的源码分支
  workflow_dispatch:

# 只构建并推送到另一个仓库，不需要 pages 权限
permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build VitePress site
        run: pnpm build   # 确保这个命令生成 ./docs/.vitepress/dist

      - name: Deploy to another repository
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}   # 注意参数名是 personal_token
          external_repository: ytahml/ytahml.github.io   # 你的目标仓库
          publish_branch: main                           # 目标仓库的分支（通常是 main 或 master）
          publish_dir: ./docs/.vitepress/dist            # 构建输出目录
          keep_files: false
          user_name: 'imulan'
          user_email: '2802470158@qq.com'
          commit_message: 'Deploy from ${{ github.repository }}@${{ github.sha }}'